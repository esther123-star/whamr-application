<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whamr — Sign In Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      margin: 0;
    }
    #app {
      text-align: center;
      padding: 2rem;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    button.clerk-btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: white;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
    }
    button.clerk-btn.primary {
      background: black;
      color: white;
      border-color: black;
    }
    button.clerk-btn:hover { opacity: 0.85; }
    h1 { font-size: 2rem; font-weight: 500; }
  </style>
</head>
<body>

  <div id="app">Loading...</div>

  <!-- Load Clerk -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_ZW5nYWdlZC13aWxkY2F0LTQxLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://engaged-wildcat-41.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>

  <!-- Run our auth logic -->
  <script>
    window.addEventListener("load", async function () {
      await Clerk.load();
      render();
      Clerk.addListener(render);
    });

    function render() {
      const app = document.getElementById("app");

      if (Clerk.user) {
        const name = Clerk.user.firstName || Clerk.user.username || "there";
        app.innerHTML = `
          <h1>Hi, ${name}.</h1>
          <div id="user-button"></div>
        `;
        Clerk.mountUserButton(document.getElementById("user-button"));
      } else {
        app.innerHTML = `
          <div class="btn-row">
            <button class="clerk-btn" id="sign-in-btn">Sign In</button>
            <button class="clerk-btn primary" id="sign-up-btn">Sign Up</button>
          </div>
        `;
        document.getElementById("sign-in-btn").addEventListener("click", () => Clerk.openSignIn());
        document.getElementById("sign-up-btn").addEventListener("click", () => Clerk.openSignUp());
      }
    }
  </script>
</body>
</html>
